<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <link rel="stylesheet" href="bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css?v=1.03" />
    <link rel="stylesheet" href="TinyTutor.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#c84010" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TinyTutor" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <script>
        // Preset palette — applied before WASM loads so there's no flash
        var _pal = {
            '#c84010':{lt:'#d45018',dk:'#8a1800',glow:'rgba(200,64,16,.45)',  border:'#6a1500',shine:'rgba(255,140,60,.25)', bgc:'#cc4010',bgm:'#6a1a08'},
            '#c82828':{lt:'#d83838',dk:'#8a0000',glow:'rgba(200,40,40,.45)',  border:'#6a0000',shine:'rgba(255,96,84,.25)',  bgc:'#cc2828',bgm:'#6a0808'},
            '#d44080':{lt:'#e05090',dk:'#8a1850',glow:'rgba(212,64,128,.45)', border:'#6a1040',shine:'rgba(255,140,172,.25)',bgc:'#d44080',bgm:'#6a1040'},
            '#8040c8':{lt:'#9050d8',dk:'#501888',glow:'rgba(128,64,200,.45)', border:'#400870',shine:'rgba(183,116,255,.25)',bgc:'#8040c8',bgm:'#401070'},
            '#2060c8':{lt:'#3070d8',dk:'#003888',glow:'rgba(32,96,200,.45)',  border:'#001870',shine:'rgba(87,172,255,.25)', bgc:'#2060c8',bgm:'#001060'},
            '#108890':{lt:'#1898a0',dk:'#005860',glow:'rgba(16,136,144,.45)', border:'#003848',shine:'rgba(70,212,220,.25)', bgc:'#108890',bgm:'#003840'},
            '#208850':{lt:'#309860',dk:'#005820',glow:'rgba(32,136,80,.45)',  border:'#003818',shine:'rgba(87,212,124,.25)', bgc:'#208850',bgm:'#003820'},
            '#b88010':{lt:'#c89018',dk:'#785000',glow:'rgba(184,128,16,.45)', border:'#583000',shine:'rgba(239,204,70,.25)', bgc:'#b88010',bgm:'#584000'}
        };
        window.getSavedTheme = function () { return localStorage.getItem('tinytutor-theme'); };
        window.saveTheme     = function (hex) { localStorage.setItem('tinytutor-theme', hex); };
        window.applyTheme    = function (hex) {
            var p = _pal[hex], s = document.documentElement.style;
            if (p) {
                s.setProperty('--primary', hex); s.setProperty('--primary-lt', p.lt); s.setProperty('--primary-dk', p.dk);
                s.setProperty('--glow', p.glow); s.setProperty('--btn-border', p.border); s.setProperty('--btn-shine', p.shine);
                s.setProperty('--bg-center', p.bgc); s.setProperty('--bg-mid', p.bgm);
            } else {
                var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                var lt  = 'rgb('+Math.min(255,r+28)+','+Math.min(255,g+16)+','+Math.min(255,b+8)+')';
                var dk  = 'rgb('+Math.floor(r*.55)+','+Math.floor(g*.38)+','+Math.floor(b*.30)+')';
                var glow= 'rgba('+r+','+g+','+b+',.45)';
                var bdr = 'rgb('+Math.floor(r*.40)+','+Math.floor(g*.25)+','+Math.floor(b*.20)+')';
                var shn = 'rgba('+Math.min(255,r+55)+','+Math.min(255,g+76)+','+Math.min(255,b+44)+',.25)';
                var bgm = 'rgb('+Math.floor(r*.42)+','+Math.floor(g*.30)+','+Math.floor(b*.25)+')';
                s.setProperty('--primary', hex); s.setProperty('--primary-lt', lt); s.setProperty('--primary-dk', dk);
                s.setProperty('--glow', glow); s.setProperty('--btn-border', bdr); s.setProperty('--btn-shine', shn);
                s.setProperty('--bg-center', hex); s.setProperty('--bg-mid', bgm);
            }
        };
        window.getSavedLang  = function () { return localStorage.getItem('tinytutor-lang'); };
        window.saveLang      = function (lang) { localStorage.setItem('tinytutor-lang', lang); };
        window.blurActive    = function () { if (document.activeElement) document.activeElement.blur(); };
        (function () {
            var t = localStorage.getItem('tinytutor-theme'); if (!t) return;
            var p = _pal[t], s = document.documentElement.style;
            if (p) {
                s.setProperty('--primary',t); s.setProperty('--primary-lt',p.lt); s.setProperty('--primary-dk',p.dk);
                s.setProperty('--glow',p.glow); s.setProperty('--btn-border',p.border); s.setProperty('--btn-shine',p.shine);
                s.setProperty('--bg-center',p.bgc); s.setProperty('--bg-mid',p.bgm);
            }
        })();
    </script>
</head>

<body>
    <div id="app">
        <div style="display:flex;height:100vh;align-items:center;justify-content:center;color:#f5e8e0;font-family:sans-serif;font-size:1.2rem;">
            Laden...
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/speech.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator)
            navigator.serviceWorker.register('/service-worker.js');
    </script>
</body>

</html>
